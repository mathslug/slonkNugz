name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_URL }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ANTHROPIC_KEY,ADMIN_PASSWORD
          script: |
            set -e
            # Support both old (kalshi-arb) and new (slonk-arb) directory layouts
            if [ -d /opt/slonk-arb ]; then
                APP_DIR=/opt/slonk-arb
                DATA_DIR=/var/lib/slonk-arb
                SVC=slonk-arb
                OWNER=slonk
            else
                APP_DIR=/opt/kalshi-arb
                DATA_DIR=/var/lib/kalshi-arb
                SVC=kalshi-arb
                OWNER=kalshi
            fi
            cd "$APP_DIR"
            git reset --hard origin/main
            git pull origin main
            uv sync
            if [ ! -f "$DATA_DIR/.env" ]; then
                printf "ANTHROPIC_API_KEY=%s\nSLONK_ADMIN_PASSWORD=\"%s\"\n" "$ANTHROPIC_KEY" "$ADMIN_PASSWORD" | sudo tee "$DATA_DIR/.env" > /dev/null
                sudo chown "$OWNER:$OWNER" "$DATA_DIR/.env"
                sudo chmod 600 "$DATA_DIR/.env"
            fi
            sudo systemctl restart "$SVC"
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          ADMIN_PASSWORD: ${{ secrets.SLONK_ADMIN_PASSWORD }}
