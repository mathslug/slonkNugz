{% extends "base.html" %}
{% block title %}Trade Signals - Kalshi Arb{% endblock %}
{% block content %}
<h2>Trade Signals ({{ signals|length }})</h2>

{% if not signals %}
<p>No trade signals yet. Run <code>evaluate.py</code> to generate signals.</p>
{% else %}
<figure>
<table>
  <thead>
    <tr>
      <th>Pair</th>
      <th>Antecedent</th>
      <th>Consequent</th>
      <th>Signal</th>
      <th>Yield</th>
      <th>Excess</th>
      <th>N</th>
      <th>Cost</th>
      <th>First Seen</th>
      <th>Last Refreshed</th>
      <th>Refreshes</th>
    </tr>
  </thead>
  <tbody>
    {% for s in signals %}
    <tr>
      <td><a href="/pair/{{ s.pair_id }}">#{{ s.pair_id }}</a></td>
      <td>
        <a href="https://kalshi.com/markets/{{ s.antecedent_event_ticker }}" target="_blank">{{ s.antecedent_ticker }}</a>
        <br><small>{{ s.antecedent_title }}</small>
      </td>
      <td>
        <a href="https://kalshi.com/markets/{{ s.consequent_event_ticker }}" target="_blank">{{ s.consequent_ticker }}</a>
        <br><small>{{ s.consequent_title }}</small>
      </td>
      <td>
        {% if s.last_recommendation == 'buy' %}
          <mark>BUY</mark>
        {% else %}
          PASS
        {% endif %}
      </td>
      <td>{% if s.last_yield is not none %}{{ "%.2f"|format(s.last_yield * 100) }}%{% else %}N/A{% endif %}</td>
      <td>
        {% if s.last_excess is not none %}
          <span style="color:{{ 'green' if s.last_excess > 0 else 'red' }}">{{ "%+.2f"|format(s.last_excess * 100) }}%</span>
        {% else %}
          N/A
        {% endif %}
      </td>
      <td>{{ s.last_n or 0 }}</td>
      <td>{% if s.last_cost is not none %}${{ "%.2f"|format(s.last_cost) }}{% else %}N/A{% endif %}</td>
      <td><small>{{ s.first_seen_at[:10] }}</small></td>
      <td><small>{{ s.last_refreshed[:10] }}</small></td>
      <td>{{ s.refresh_count }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</figure>
{% endif %}
{% endblock %}
