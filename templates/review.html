{% extends "base.html" %}
{% block title %}{{ title }} - Kalshi Arb{% endblock %}
{% block content %}
<h2>{{ title }} ({{ pairs|length }})</h2>

<nav style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
  <a href="?"{%if not confidence %} aria-current="page"{% endif %} role="button" class="{% if not confidence %}primary{% else %}outline{% endif %}" style="padding:4px 12px;font-size:0.85rem">All</a>
  {% for level in ["high", "medium", "low"] %}
  <a href="?confidence={{ level }}"{%if confidence == level %} aria-current="page"{% endif %} role="button" class="{% if confidence == level %}primary{% else %}outline{% endif %}" style="padding:4px 12px;font-size:0.85rem">{{ level|capitalize }}</a>
  {% endfor %}
</nav>

{% if not pairs %}
<p>No pairs to show.</p>
{% else %}
<figure>
<table>
  <thead>
    <tr>
      <th>Antecedent</th>
      <th>Consequent</th>
      <th>Confidence</th>
      <th>Yield</th>
      <th>Hurdle</th>
      <th>Reasoning</th>
      {% if status == "reviewed" %}<th>Review</th>{% endif %}
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for p in pairs %}
    <tr>
      <td>
        <a href="https://kalshi.com/markets/{{ p.antecedent_event_ticker }}" target="_blank">{{ p.antecedent_ticker }}</a>
        <br><small>{{ p.antecedent_title }}</small>
      </td>
      <td>
        <a href="https://kalshi.com/markets/{{ p.consequent_event_ticker }}" target="_blank">{{ p.consequent_ticker }}</a>
        <br><small>{{ p.consequent_title }}</small>
      </td>
      <td>{{ p.confidence }}</td>
      <td>{% if p.annualized_yield is not none %}{% if p.annualized_yield > 9.99 %}&gt;999%{% else %}{{ "%.2f"|format(p.annualized_yield * 100) }}%{% endif %}{% else %}N/A{% endif %}</td>
      <td>{% if p.hurdle_yield is not none %}{{ "%.2f"|format(p.hurdle_yield * 100) }}%{% else %}N/A{% endif %}</td>
      <td><small>{{ p.reasoning[:80] if p.reasoning else '' }}{% if p.reasoning and p.reasoning|length > 80 %}...{% endif %}</small></td>
      {% if status == "reviewed" %}<td>{{ p.human_review }}</td>{% endif %}
      <td>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:stretch;min-width:80px">
        <a href="/pair/{{ p.id }}" role="button" class="outline" style="padding:4px 8px;font-size:0.8rem;text-align:center">Detail</a>
        {% if status == "unreviewed" %}
        <form method="post" action="/pair/{{ p.id }}/review">
          <input type="hidden" name="next" value="/review">
          <button type="submit" name="decision" value="confirmed" style="padding:4px 8px;font-size:0.8rem;margin:0;width:100%">Confirm</button>
        </form>
        <form method="post" action="/pair/{{ p.id }}/review">
          <input type="hidden" name="next" value="/review">
          <button type="submit" name="decision" value="rejected" class="secondary" style="padding:4px 8px;font-size:0.8rem;margin:0;width:100%">Reject</button>
        </form>
        {% endif %}
        </div>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</figure>
{% endif %}
{% endblock %}
